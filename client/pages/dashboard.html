<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Room - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="dashboard">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>
    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">Validation Room</p>
          <h1>Task Dashboard</h1>
        </div>
        <button id="toggle-task-form" class="btn btn-primary">+ New Task</button>
      </header>

      <section id="task-form-panel" class="panel hidden">
        <h2>Create Task</h2>
        <form id="task-form" class="grid-form">
          <label>
            Title
            <input type="text" name="title" required maxlength="200" />
          </label>
          <label>
            Issue Number
            <input type="number" name="issue_number" required min="1" />
          </label>
          <label>
            Issue URL
            <input type="url" name="issue_url" required />
          </label>
          <label>
            PR URL
            <input type="url" name="pr_url" required />
          </label>
          <label>
            Status
            <select name="status">
              <option>To Validate</option>
              <option>In Validation</option>
              <option>Blocked</option>
              <option>Done</option>
            </select>
          </label>
          <label>
            Priority
            <select name="priority">
              <option>Low</option>
              <option selected>Medium</option>
              <option>High</option>
              <option>Critical</option>
            </select>
          </label>
          <label>
            Change Type
            <select name="change_type">
              <option selected>Backend</option>
              <option>Frontend</option>
              <option>Database</option>
              <option>Infra</option>
              <option>Business Rule</option>
            </select>
          </label>
          <label class="full-width">
            Technical Notes
            <textarea name="technical_notes" rows="3"></textarea>
          </label>
          <div class="actions full-width">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" id="cancel-task-form" class="btn btn-ghost">Cancel</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="toolbar">
          <h2>All Tasks</h2>
          <div class="filters">
            <label>
              Status
              <select id="filter-status">
                <option value="">All</option>
                <option>To Validate</option>
                <option>In Validation</option>
                <option>Blocked</option>
                <option>Done</option>
              </select>
            </label>
            <label>
              Priority
              <select id="filter-priority">
                <option value="">All</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
                <option>Critical</option>
              </select>
            </label>
          </div>
        </div>
        <div id="tasks-list" class="cards"></div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
